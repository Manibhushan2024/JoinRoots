[providers]
  node = "18"
  python = "3.10"
  php = "8.2"

[phases.setup]
  nixPkgs = ["php82", "php82Packages.composer", "nodejs", "npm"]

[phases.install]
  cmds = ["npm install", "composer install --no-dev --optimize-autoloader"]

[phases.build]
  cmds = ["npm run build", "php artisan config:cache", "php artisan route:cache", "php artisan view:cache"]

[start]
  cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"
